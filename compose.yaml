services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: fairshare
      POSTGRES_USER: fairshare
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fairshare -d fairshare"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dev
      MINIO_ROOT_PASSWORD: devsecret
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - minio-data:/data

  minio-setup:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 dev devsecret; do
        echo 'Waiting for MinIO to be ready...';
        sleep 1;
      done && mc mb --ignore-existing local/fairshare-receipts && echo 'bucket created and is ready'
      "

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # UI
      - "4318:4318"      # OTLP HTTP receiver

  app:
    image: fairshare:local
    profiles: ["app"]
    depends_on:
      postgres: 
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fairshare
      SPRING_DATASOURCE_USERNAME: fairshare
      SPRING_DATASOURCE_PASSWORD: dev
      SPRING_DATA_REDIS_HOST: redis
      STORAGE_ENDPOINT: http://minio:9000
      OLTP_ENDPOINT: http://jaeger:4318/v1/traces

volumes:
  postgres-data:
  minio-data:

