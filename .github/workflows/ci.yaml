name: CI
dependency-submission:
    continue-on-error: true        
    permissions:
      contents: write
on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4

  build:
    name: Compile & Test
    runs-on: ubuntu-latest
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      # setup-gradle automatically caches your dependencies for faster subsequent runs
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Compile, Test, and Assemble
        run: ./gradlew test bootJar
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/test
          if-no-files-found: ignore

  static-analysis:
    name: Static Analysis (Spotless)
    runs-on: ubuntu-latest
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Enforce Code Formatting
        run: ./gradlew spotlessCheck

  dependency-submission:
    name: Dependency Submission
    runs-on: ubuntu-latest
    needs: validate-wrapper
    # This specific job needs write access to submit the dependency graph to GitHub
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Submit to Dependabot
        uses: gradle/actions/dependency-submission@v4